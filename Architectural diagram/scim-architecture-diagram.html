<script>
  function getSVG() { return document.getElementById('arch-svg'); }

  function downloadSVG() {
    const svg = getSVG();
    let src = new XMLSerializer().serializeToString(svg);
    // Ensure standalone SVG has XML declaration
    src = '<?xml version="1.0" encoding="utf-8"?>\n' + src;
    const a = Object.assign(document.createElement('a'), {
      href: URL.createObjectURL(new Blob([src], { type: 'image/svg+xml;charset=utf-8' })),
      download: 'SCIM-Architecture.svg'
    });
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  }

  function downloadPNG() {
    const svg = getSVG();
    const scale = 2;
    const W = 980 * scale;
    const H = 1295 * scale;

    const src = new XMLSerializer().serializeToString(svg);
    const svgBlob = new Blob([src], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(svgBlob);

    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = W;
      canvas.height = H;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#f8fafc';
      ctx.fillRect(0, 0, W, H);
      ctx.drawImage(img, 0, 0, W, H);
      URL.revokeObjectURL(url);
      const a = Object.assign(document.createElement('a'), {
        href: canvas.toDataURL('image/png'),
        download: 'SCIM-Architecture.png'
      });
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    };
    img.src = url;
  }
</script>
