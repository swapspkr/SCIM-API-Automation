name: SCIM API Test Automation Framework

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1截뤴깵 Checkout the repository
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2截뤴깵 Setup Java
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21.0.9'
          distribution: 'temurin'

      # 3截뤴깵 Create config.properties from GitHub secrets
      - name: Set config properties
        run: |
          mkdir -p src/test/resources
          echo "PlatformApplicationUser=${{ secrets.SCIM_USERNAME }}" > src/test/resources/config.properties
          echo "PlatformApplicationUserPassword=${{ secrets.SCIM_PASSWORD }}" >> src/test/resources/config.properties

      # 4截뤴깵 Build and run tests with Maven
      - name: Build and run tests
        run: mvn clean test -Dsuite=suite
