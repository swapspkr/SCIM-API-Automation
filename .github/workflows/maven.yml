name: SCIM API Test Automation Framework

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout the code
    - name: Checkout repository
      uses: actions/checkout@v4

    # Step 2: Setup Java JDK
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21.0.9'
        distribution: 'temurin'

    # Step 3: Create config.properties from GitHub Secrets
    - name: Set config properties
      run: |
        mkdir -p src/test/resources
        echo "PlatformApplicationUser=${{ secrets.SCIM_USERNAME }}" > src/test/resources/config.properties
        echo "PlatformApplicationUserPassword=${{ secrets.SCIM_PASSWORD }}" >> src/test/resources/config.properties

    # Step 4: Run Maven tests
    - name: Build and run tests
      run: mvn clean test -Dsuite=suite -X

    # Step 5: Upload logs as artifact
    - name: Upload logs artifact
      uses: actions/upload-artifact@v4
      with:
        name: TestLogs
        path: logs/    # Replace with the actual folder path your project generates logs

    # Step 6: Zip logs (optional if multiple files)
    - name: Zip logs
      run: zip -r logs.zip logs/

    # Step 7: Send email with status
    - name: Send Email with Test Status
      if: always()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "SCIM Automation Test Result - ${{ github.run_number }}"
        body: |
          Hello,

          The SCIM Automation tests have completed.

          Workflow: ${{ github.workflow }}
          Status: ${{ job.status }}
          Run Number: ${{ github.run_number }}
          Branch: ${{ github.ref }}
          
          Check logs for details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

        to: "swapspkr@gmail.com"
        from: "swapspkr@gmail.com"
        secure: true
